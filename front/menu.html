<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Patio Vegan - Gastronomía Vegana</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            background: #b4d351;
            min-height: 100vh;
        }

        nav {
            background: #b4d351;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            border-bottom: 2px solid #a0bb47;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #444;
            flex-shrink: 0;
        }

        .brand-name {
            font-size: 1.6rem;
            font-weight: bold;
            color: #222;
        }

        .nav-links {
            display: flex;
            gap: 28px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #222;
            font-size: 1.1rem;
            transition: color .2s;
        }

        .nav-links a:hover {
            color: #005500;
        }

        .nav-links a.active {
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        #cart-count {
            background: #ff4444;
            color: white;
            border-radius: 50%;
            padding: 1px 6px;
            font-size: .75rem;
            margin-left: 3px;
            display: none;
        }

        main {
            padding: 28px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: transform .2s, box-shadow .2s;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
        }

        .product-card img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            border-radius: 8px;
            display: block;
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-size: 1rem;
            font-weight: bold;
            color: #111;
            margin-bottom: 2px;
        }

        .product-price {
            font-size: .95rem;
            color: #222;
            margin-bottom: 8px;
        }

        .add-btn {
            width: 100%;
            padding: 8px;
            background: #228B22;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: .9rem;
            font-weight: bold;
            transition: background .2s;
        }

        .add-btn:hover {
            background: #1a6b1a;
        }

        .add-btn:active {
            transform: scale(.97);
        }

        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #228B22;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: .9rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s;
            font-family: 'Comic Sans MS', cursive;
        }

        #toast.show {
            opacity: 1;
        }
    </style>
</head>

<body>

    <nav>
        <div class="nav-brand">
            <img class="logo"
                src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTAQ4Wi2iqKiIYWscDbrSOuEH6lWk_Waxm6cnPZnaOn2FbxN2AAzdq2tdg&s=10"
                alt="El Patio Vegan logo">
            <span class="brand-name">Gastronomía vegana</span>
        </div>
        <ul class="nav-links">
            <li><a href="menu.html" class="active">menú</a></li>
            <li><a href="carrito.html">carrito <span id="cart-count"></span></a></li>
            <li><a href="https://github.com/gabrieeela/pweb2-entrega-app-web" target="_blank">github</a></li>
        </ul>
    </nav>

    <main>
        <div class="products-grid" id="products-grid"></div>
    </main>

    <div id="toast"></div>

    <script>
        let PRODUCTS = [];

        // almacenamiento local
        function loadCart() {
            try { return JSON.parse(localStorage.getItem('el-patio-cart') || '{}'); }
            catch { return {}; }
        }

        function saveCart(cart) {
            localStorage.setItem('el-patio-cart', JSON.stringify(cart));
        }

        // carrito
        function addToCart(id) {
            const cart = loadCart();
            const p = PRODUCTS.find(x => x.id === id);
            if (!cart[id]) cart[id] = { qty: 0, name: p.name, price: p.price };
            cart[id].qty += 1;
            saveCart(cart);
            updateBadge();
            showToast('¡Agregado al carrito!');
        }

        function updateBadge() {
            const cart = loadCart();
            const total = Object.values(cart).reduce((s, item) => s + item.qty, 0);
            const badge = document.getElementById('cart-count');
            if (total > 0) { badge.textContent = total; badge.style.display = 'inline'; }
            else { badge.style.display = 'none'; }
        }

        // productos
        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = PRODUCTS.map(p => `
                <div class="product-card">
                    <img src="${p.img}" alt="${p.name}" loading="lazy">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">$${p.price.toLocaleString('es-AR')}</div>
                    </div>
                    <button class="add-btn" onclick="addToCart(${p.id})">Agregar al carrito</button>
                </div>
            `).join('');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1800);
        }

        async function init() {
            const res = await fetch('/api/products');
            PRODUCTS = await res.json();
            PRODUCTS = PRODUCTS.map(p => ({
                ...p,
                img: `/images/${p.img}`
            }));
            renderProducts();
            updateBadge();
        }

        init();
    </script>
</body>

</html>
